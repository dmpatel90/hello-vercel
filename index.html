<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hello Vercel</title>

    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/app.js" defer></script>
</head>
<body>

    <header>
        <h1>Hello Vercel</h1>
        <p>This is my first static website deployed using Vercel CLI.</p>
    </header>

    <main>

        <section class="card">
            <h2>Static Website Deployment</h2>

            <p>
                This project uses only HTML, CSS, and JavaScript.
                There is no backend server required.
            </p>

            <button id="messageBtn">Click Me</button>

            <p id="messageOutput"></p>
        </section>

        <section class="card">
            <h2>API Example</h2>

            <p>
                Click the button below to call a public API using JavaScript fetch().
            </p>

            <button id="apiBtn">Load API Data</button>

            <div id="apiOutput"></div>
        </section>

    </main>

    <footer>
        <p>WEB700 Deployment Practice</p>
    </footer>

</body>
</html>
